<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hornet Helpers{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
    <div class="figma-shell">
        <aside class="figma-sidebar">
            <div class="sidebar-logo-wrap">
                <div class="sidebar-logo-circle">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Hornet Helpers logo">
                </div>
            </div>

            <nav class="figma-sidebar-nav">
                <a href="{{ url_for('account') }}">Full Name</a>
                <a href="#">Events Calendar</a>
                <a href="#">Personal Calendar</a>
                <a href="#">Resume Workshop</a>
                <a href="#">Notifications</a>
            </nav>
        </aside>

        <div class="figma-main">
            <header class="figma-topbar">
                <div class="figma-banner-title">
                    March 20: Hornet Helper's Annual Potluck!
                </div>
                <a href="{{ url_for('login') }}" class="figma-signout">Sign Out</a>
            </header>

            <main class="figma-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
