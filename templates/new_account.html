{% extends "base.html" %}
{% block content %}
<a class="signup-btn" href="{{ url_for('acc_login') }}">Already have an account? Login</a>

{% with messages = get_flashed_messages() %}
    {% if messages %}
<div class="popup" style="display: block;">{{ messages[0] }}</div>
    {% else %}
<div class="popup"></div>
    {% endif %}
{% endwith %}

<div class="textbox">
    <a href="{{ url_for('acc_login') }}">
        <div class="logo"></div>
    </a>
    <!-- Added explicit action to ensure it routes correctly -->
    <form action="{{ url_for('new_account') }}" method="POST">
        <div class="form-container">
            <h2>Create Account</h2>

            <!-- Added Full Name field to match repo.add_user requirements -->
            <div class="form-row">
                <label for="full_name">Full Name:</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>

            <div class="form-row">
                <label for="user">Username:</label>
                <input type="text" id="user" name="user" required>
            </div>

            <div class="form-row">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-row">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-row">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit">Register</button>
        </div>
    </form>
</div>
{% endblock %}
