{% extends "base.html" %}

{% block content %}
<div class="textbox">
    <a href="{{ url_for('login') }}">
        <div class="logo"></div>
    </a>
    <form>
        <div class="form-container">
            <div class="form-row">
                <label for="user">Username:</label>
                <input type="text" id="user" name="user">
            </div>
            <div class="form-row">
                <label for="password">Password:</label>
                <input type="text" id="password" name="password">
            </div>
            <button type="button" onclick="showPopup()">Enter</button>
            <p>
                <a href="{{ url_for('username') }}">Forgot username</a>
                |
                <a href="{{ url_for('password') }}">Forgot password</a>
            </p>
        </div>
    </form>
</div>
{% endblock %}
