{% extends "base.html" %}

{% block content %}
    <div class="landing-page">
        <a class="dashboard-logo-btn" href="{{ url_for('organizer_home') }}" aria-label="Hornet Helpers home"></a>

        <div class="dashboard-copy">
            <h1>Welcome, {{ user.full_name }}!</h1>
            <p>Your account type is <strong>{{ user.account_type }}</strong>.</p>
            <h2>Organizer Dashboard</h2>
        </div>

        <div class="button-group dashboard-grid">
            <a class="action-btn" href="{{ url_for('new_event') }}">Create New Event</a>
            <a class="action-btn" href="{{ url_for('event_calendar') }}">View All Events</a>
            <a class="action-btn" href="{{ url_for('personal_calendar') }}">Organization Events</a>
            <a class="action-btn" href="{{ url_for('delete_events_page') }}">Delete Event</a>
        </div>

        <a class="account-link" href="{{ url_for('account') }}">Go to My Account</a>
    </div>
{% endblock %}
