{% extends "base.html" %}

{% block content %}
    <div class="landing-page">
        <h1>Welcome, {{ user.full_name }}!</h1>
        <p>Your account type is <strong>{{ user.account_type }}</strong>.</p>
        <h2>Volunteer Dashboard</h2>
        <ul>
            <li>View available events.</li>
            <li>Register for events.</li>
            <li>Cancel event registrations.</li>
        </ul>
        <a href="{{ url_for('account') }}">Go to My Account</a>
    </div>
{% endblock %}
